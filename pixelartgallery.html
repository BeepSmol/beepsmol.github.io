<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeepSmol | Pixel Art</title> 
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --panel-bg: #2d3436;
            --text-main: #f1f5f9;
            --purple-accent: #a29bfe;
            --yellow-accent: #facc15;
            --indie-border: 1px solid #000;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            border: ridge rgb(175, 148, 29) 20px;
            background-image: url('placeholder.png');
            background-repeat: repeat;
            background-size: 100px 100px;
        }

        /* --- Main Layout --- */
        .site-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .content-box {
            background: var(--panel-bg);
            border: ridge rgb(0, 0, 0) 6px;
            margin-bottom: 30px;
            position: relative;
            box-shadow: 0 0 10px 12.5px rgba(0,0,0,0.3);
            background-image: linear-gradient(to bottom, #494636, #2d3436);
        }

        .box-title {
            background: var(--purple-accent);
            color: #1a1a2e;
            padding: 2px 15px;
            font-family: sans-serif;
            font-size: 1.5rem;
            display: inline-block;
            margin-top: -18px;
            margin-left: 15px;
            border: ridge rgb(0, 0, 0) 3px;
            font-weight: bold;
        }

        .box-body { padding: 25px; }

        /* --- Gallery Grid --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .art-card {
            background: #000;
            border: 3px solid #000;
            aspect-ratio: 1/1;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 4px 4px 0px #000;
        }

        .art-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--purple-accent);
        }

        .art-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: pixelated;
        }

        /* --- Modal --- */
        #art-modal {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--panel-bg);
            border: ridge rgb(175, 148, 29) 6px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            position: relative;
            padding: 20px;
        }

        #modal-image-view, #pbn-view, #pbn-legend {
            transition: opacity 2s ease-in-out, transform 2s ease-in-out;
        }

        #pbn-view.completing {
            transform: scale(1.05);
            opacity: 0;
            pointer-events: none;
        }

        .modal-image {
            width: 100%;
            max-height: 70vh;
            object-fit: contain;
            image-rendering: pixelated;
            border: 4px solid #000;
            background: #000;
            margin-bottom: 15px;
        }

        .pbn-canvas-container {
            max-height: 60vh;
            overflow: auto;
            background: #fff;
            border: 4px solid #000;
            margin-bottom: 15px;
            display: none;
            scroll-behavior: auto; /* Required for precise programmatic scrolling during zoom */
        }

        .pbn-canvas-container canvas {
            display: block;
            width: 100%;
            height: auto !important;
        }

        .watch-link {
            display: inline-block;
            background: var(--yellow-accent);
            color: #000;
            font-weight: bold;
            padding: 10px 20px;
            text-decoration: none;
            border: 3px solid #000;
            box-shadow: 4px 4px 0px #000;
            text-transform: uppercase;
            transition: all 0.1s;
        }

        .watch-link:hover {
            background: white;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #000;
        }

        .legend-item.active {
            outline: 3px solid var(--yellow-accent);
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            padding: 2px;
            transform: scale(1.1);
        }

        .legend-item.completed {
            opacity: 0.2;
            pointer-events: none;
            filter: grayscale(1);
        }

        .pbn-btn {
            background: var(--purple-accent);
            color: #1a1a2e;
            font-weight: bold;
            padding: 10px 20px;
            text-decoration: none;
            border: 3px solid #000;
            box-shadow: 4px 4px 0px #000;
            text-transform: uppercase;
            transition: all 0.1s;
            cursor: pointer;
            margin-right: 10px;
        }

        .pbn-btn:hover {
            background: white;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #000;
        }

        #pbn-legend {
            display: none;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border: 2px solid #000;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            color: #fff;
            font-size: 0.8rem;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border: 1px solid #fff;
        }

        .close-modal {
            position: absolute;
            top: -40px;
            right: -10px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        .nav-wrapper { background: var(--bg-dark); border-bottom: var(--indie-border); padding: 15px 10px; position: sticky; top: 0; z-index: 1000; text-align: center; }
        .nav-title { font-family: sans-serif; font-size: 2.8rem; color: var(--yellow-accent); text-shadow: 3px 3px 0px #000; margin-bottom: 12px; display: block; text-decoration: none; }
        .nav-links { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .nav-links a { background: var(--purple-accent); color: #1a1a2e; border: 2px solid #000; padding: 6px 16px; text-decoration: none; font-weight: bold; font-size: 1.2rem; box-shadow: 3px 3px 0px #000; transition: all 0.1s; text-transform: uppercase; }
        .nav-links a:hover { background: var(--yellow-accent); transform: translate(-2px, -2px); box-shadow: 5px 5px 0px #000; }
    </style>
</head>

    let displayedPixelArt = []; // Declare a global variable to hold the sorted/displayed art

    function renderGallery() {
        const grid = document.getElementById('gallery-grid');
        // Reverse the original list order (bottom of the code list appears first)
        displayedPixelArt = [...pixelArt].reverse();

        grid.innerHTML = displayedPixelArt.map((art, index) => `
            <div class="art-card" onclick="openModal(${index})">
                <img src="${art.image}" alt="${art.title}" onerror="this.src='https://via.placeholder.com/300/000/a29bfe?text=PIXEL+ART'">
            </div>
        `).join('');
    }

    function openModal(index) {
        const art = displayedPixelArt[index]; // Use the globally accessible displayedPixelArt
        document.getElementById('modal-img').src = art.image;
        document.getElementById('modal-title').innerText = art.title;
        document.getElementById('modal-video').href = art.video;
        
        // Reset view
        document.getElementById('modal-image-view').style.display = 'block';
        document.getElementById('pbn-view').style.display = 'none';
        document.getElementById('pbn-legend').style.display = 'none';
        document.getElementById('pbn-toggle').innerText = "Paint by Number";
        
        document.getElementById('art-modal').style.display = 'flex';
    }

    function closeModal(e) {
        document.getElementById('art-modal').style.display = 'none';
    }

    async function togglePBN() {
        const imgView = document.getElementById('modal-image-view');
        const pbnView = document.getElementById('pbn-view');
        const legendView = document.getElementById('pbn-legend');
        const btn = document.getElementById('pbn-toggle');
        const img = document.getElementById('modal-img');

        if (pbnView.style.display === 'none') {
            const originalText = btn.innerText;
            btn.innerText = "Processing...";
            btn.disabled = true;
            try {
                // Add a timestamp to bypass potential cached versions without CORS headers
                const proxySrc = img.src + (img.src.includes('?') ? '&' : '?') + 't=' + Date.now();
                await generatePBN(proxySrc);
                imgView.style.display = 'none';
                pbnView.style.display = 'block';
                legendView.style.display = 'flex';
                btn.innerText = "Show Original";
            } catch (err) {
                console.error("Paint by Number failed:", err);
                alert("Could not generate Paint by Number. This often happens due to security restrictions (CORS) when loading images from a different domain.");
                btn.innerText = originalText;
            } finally {
                btn.disabled = false;
            }
        } else {
            imgView.style.display = 'block';
            pbnView.style.display = 'none';
            legendView.style.display = 'none';
            btn.innerText = "Paint by Number";
        }
    }

    let pbnData = { 
        selectedColorIndex: null, 
        grid: [], 
        filledGrid: [],
        colorTotalCounts: {},
        colorFilledCounts: {},
        cellSize: 25, 
        colors: [], 
        isDragging: false, 
        zoomLevel: 1 
    };

    function generatePBN(src) {
        return new Promise((resolve, reject) => {
            const canvas = document.getElementById('pbn-canvas');
            const ctx = canvas.getContext('2d');
            const legend = document.getElementById('pbn-legend');
            const img = new Image();
            img.setAttribute('crossOrigin', 'anonymous');
            img.onload = () => {
                try {
                    // Reset zoom
                    pbnData.zoomLevel = 1;
                    canvas.style.width = '100%';

                    // Force the PBN to be exactly 50x50
                    const w = 50;
                    const h = 50;
                    const offCanvas = document.createElement('canvas');
                    const offCtx = offCanvas.getContext('2d');
                    offCtx.imageSmoothingEnabled = false; // Keep pixels sharp for color extraction
                    offCanvas.width = w; offCanvas.height = h;
                    offCtx.drawImage(img, 0, 0, w, h);
                    let imageData = offCtx.getImageData(0, 0, w, h).data;

                    // --- Improved Palette Reduction (Distinct Colors) ---
                    const colorCounts = new Map();
                    for (let i = 0; i < imageData.length; i += 4) {
                        if (imageData[i + 3] < 128) continue;
                        const rgb = `${imageData[i]},${imageData[i+1]},${imageData[i+2]}`;
                        colorCounts.set(rgb, (colorCounts.get(rgb) || 0) + 1);
                    }

                    const sortedRawColors = Array.from(colorCounts.entries())
                        .sort((a, b) => b[1] - a[1]) // Most frequent first
                        .map(e => e[0].split(',').map(Number));

                    const palette = [];
                    const colorDist = (c1, c2) => Math.sqrt((c1[0]-c2[0])**2 + (c1[1]-c2[1])**2 + (c1[2]-c2[2])**2);
                    const similarityThreshold = 35; // Group colors that are within this distance

                    for (const candidate of sortedRawColors) {
                        if (palette.length >= 50) break;
                        // Only add if it's distinct from colors already in the palette
                        if (palette.every(p => colorDist(candidate, p) > similarityThreshold)) {
                            palette.push(candidate);
                        }
                    }

                    const getClosestColor = (r, g, b) => {
                        let minDist = Infinity, closest = palette[0];
                        for (const p of palette) {
                            const d = Math.sqrt((r-p[0])**2 + (g-p[1])**2 + (b-p[2])**2);
                            if (d < minDist) { minDist = d; closest = p; }
                        }
                        return closest;
                    };

                    const colors = []; const colorMap = new Map();
                    pbnData.grid = Array(h).fill().map(() => Array(w).fill(null));
                    pbnData.filledGrid = Array(h).fill().map(() => Array(w).fill(false));
                    pbnData.colorTotalCounts = {};
                    pbnData.colorFilledCounts = {};
                    pbnData.colors = []; pbnData.selectedColorIndex = null;
                    
                    const cellSize = pbnData.cellSize;
                    canvas.width = w * cellSize; canvas.height = h * cellSize;

                    for (let y = 0; y < h; y++) {
                        for (let x = 0; x < w; x++) {
                            const idx = (y * w + x) * 4;
                            if (imageData[idx + 3] < 128) continue;
                            
                            const closest = getClosestColor(imageData[idx], imageData[idx+1], imageData[idx+2]);
                            const rgb = `rgb(${closest[0]},${closest[1]},${closest[2]})`;
                            
                            if (!colorMap.has(rgb)) { colorMap.set(rgb, colorMap.size + 1); colors.push(rgb); }
                            const colorIndex = colorMap.get(rgb);
                            pbnData.grid[y][x] = colorIndex;
                            pbnData.colorTotalCounts[colorIndex] = (pbnData.colorTotalCounts[colorIndex] || 0) + 1;
                            pbnData.colorFilledCounts[colorIndex] = 0;
                        }
                    }
                    pbnData.colors = colors;
                    renderPBNCanvas();

                    legend.innerHTML = colors.map((color, i) => `
                        <div class="legend-item" id="legend-item-${i+1}" onclick="selectPBNColor(${i+1})">
                            <div class="legend-color" style="background: ${color}"></div>
                            <span>${i + 1}</span>
                        </div>`).join('');
                    resolve();
                } catch (e) { reject(new Error("CORS Blocked: The server hosting the image doesn't allow pixel-level access.")); }
            };
            img.onerror = () => reject(new Error("Image failed to load"));
            img.src = src;
        });
    }

    function renderPBNCanvas() {
        const canvas = document.getElementById('pbn-canvas');
        const ctx = canvas.getContext('2d');
        const h = pbnData.grid.length;
        const w = pbnData.grid[0].length;
        const cellSize = pbnData.cellSize;

        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = "12px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const colorIndex = pbnData.grid[y][x];
                if (colorIndex === null) continue;

                const cx = x * cellSize;
                const cy = y * cellSize;

                if (pbnData.filledGrid[y][x]) {
                    ctx.fillStyle = pbnData.colors[colorIndex - 1];
                    ctx.fillRect(cx, cy, cellSize, cellSize);
                } else {
                    // Highlight pixels of selected number
                    if (colorIndex === pbnData.selectedColorIndex) {
                        ctx.fillStyle = "#fffacd"; // Light yellow highlight
                        ctx.fillRect(cx, cy, cellSize, cellSize);
                    }
                    ctx.strokeStyle = "#ddd";
                    ctx.strokeRect(cx, cy, cellSize, cellSize);
                    ctx.fillStyle = "#000";
                    ctx.fillText(colorIndex, cx + cellSize / 2, cy + cellSize / 2);
                }
            }
        }
    }

    function selectPBNColor(index) {
        pbnData.selectedColorIndex = index;
        document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active'));
        if (index !== null) {
            document.getElementById(`legend-item-${index}`).classList.add('active');
        }
        renderPBNCanvas();
    }

    function handlePBNWheel(event) {
        event.preventDefault();
        const container = document.getElementById('pbn-view');
        const canvas = document.getElementById('pbn-canvas');
        const zoomSpeed = 0.1;
        const oldZoom = pbnData.zoomLevel;

        if (event.deltaY < 0) {
            pbnData.zoomLevel = Math.min(pbnData.zoomLevel + zoomSpeed, 5);
        } else {
            pbnData.zoomLevel = Math.max(pbnData.zoomLevel - zoomSpeed, 1);
        }

        if (oldZoom === pbnData.zoomLevel) return;

        // Calculate current content position under mouse before scaling
        const rect = container.getBoundingClientRect();
        const mouseX = event.clientX - rect.left;
        const mouseY = event.clientY - rect.top;

        const contentX = (mouseX + container.scrollLeft) / oldZoom;
        const contentY = (mouseY + container.scrollTop) / oldZoom;

        canvas.style.width = (pbnData.zoomLevel * 100) + '%';

        // Adjust scroll to keep contentX/Y under the mouse
        container.scrollLeft = (contentX * pbnData.zoomLevel) - mouseX;
        container.scrollTop = (contentY * pbnData.zoomLevel) - mouseY;
    }

    function handlePBNMouseDown(event) {
        pbnData.isDragging = true;
        processColoring(event);
    }

    function handlePBNMouseMove(event) {
        if (pbnData.isDragging) {
            processColoring(event);
        }
    }

    function handlePBNMouseUp() {
        pbnData.isDragging = false;
    }

    function processColoring(event) {
        if (pbnData.selectedColorIndex === null || !pbnData.grid.length) return;
        
        const canvas = document.getElementById('pbn-canvas');
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        const x = Math.floor(((event.clientX - rect.left) * scaleX) / pbnData.cellSize);
        const y = Math.floor(((event.clientY - rect.top) * scaleY) / pbnData.cellSize);

        if (y >= 0 && y < pbnData.grid.length && x >= 0 && x < pbnData.grid[0].length) {
            const colorIndex = pbnData.grid[y][x];
            if (colorIndex === pbnData.selectedColorIndex && !pbnData.filledGrid[y][x]) {
                pbnData.filledGrid[y][x] = true;
                pbnData.colorFilledCounts[colorIndex]++;
                
                // Check if color is fully colored
                if (pbnData.colorFilledCounts[colorIndex] === pbnData.colorTotalCounts[colorIndex]) {
                    document.getElementById(`legend-item-${colorIndex}`).classList.add('completed');
                    
                    // Find next incomplete color starting from the current one
                    let nextColorIdx = null;
                    const totalColors = pbnData.colors.length;
                    
                    // Cycle through colors to find the next available one
                    for (let i = 1; i <= totalColors; i++) {
                        let checkIdx = ((colorIndex + i - 1) % totalColors) + 1;
                        if (pbnData.colorFilledCounts[checkIdx] < pbnData.colorTotalCounts[checkIdx]) {
                            nextColorIdx = checkIdx;
                            break;
                        }
                    }

                    if (nextColorIdx) {
                        selectPBNColor(nextColorIdx);
                    } else {
                        handleCompletion();
                    }
                } else {
                    renderPBNCanvas(); // Update highlights
                }
            }
        }
    }

    function handleCompletion() {
        pbnData.selectedColorIndex = null;
        renderPBNCanvas();
        createConfetti();

        const pbnView = document.getElementById('pbn-view');
        const imgView = document.getElementById('modal-image-view');
        const legend = document.getElementById('pbn-legend');
        const btn = document.getElementById('pbn-toggle');

        setTimeout(() => {
            pbnView.classList.add('completing');
            legend.style.opacity = '0';
            
            setTimeout(() => {
                pbnView.style.display = 'none';
                pbnView.classList.remove('completing');
                legend.style.display = 'none';
                legend.style.opacity = '1';
                
                imgView.style.display = 'block';
                imgView.style.opacity = '0';
                void imgView.offsetWidth;
                imgView.style.opacity = '1';
                
                btn.innerText = "Paint by Number";
            }, 2000);
        }, 1000);
    }

    function createConfetti() {
        const container = document.querySelector('.modal-content');
        for (let i = 0; i < 40; i++) {
            const confetti = document.createElement('div');
            confetti.style.cssText = `position:absolute;width:8px;height:8px;background:hsl(${Math.random()*360},70%,50%);left:50%;top:50%;z-index:100;pointer-events:none;`;
            container.appendChild(confetti);

            const angle = Math.random() * Math.PI * 2;
            const velocity = 4 + Math.random() * 8;
            const vx = Math.cos(angle) * velocity;
            const vy = Math.sin(angle) * velocity;
            let x = 0, y = 0, opacity = 1;

            const anim = () => {
                x += vx; y += vy; opacity -= 0.015;
                confetti.style.transform = `translate(${x}px, ${y}px) rotate(${x}deg)`;
                confetti.style.opacity = opacity;
                if (opacity > 0) requestAnimationFrame(anim);
                else confetti.remove();
            };
            requestAnimationFrame(anim);
        }
    }

    window.onload = () => {
        renderGallery();
    };
</script>
</body>
</html>
